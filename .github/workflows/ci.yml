name: CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: clippy

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libelf1 libelf-dev zlib1g-dev libclang-dev \
          make git clang llvm pkg-config build-essential

    - name: Build BPF C programs
      run: |
        cd bpf
        make

    - name: Run C unit tests
      run: |
        cd bpf
        make test

    - name: Build frontend
      run: |
        cd frontend
        npm install
        npm run build

    - name: Build Rust collector
      run: |
        cd collector
        cargo build --verbose

    - name: Run clippy (deny warnings)
      run: |
        cd collector
        cargo clippy --all-targets -- -D warnings

    - name: Run Rust tests
      run: |
        cd collector
        cargo test --verbose

    # Rebuild the C unit tests under AddressSanitizer and run them. Done last and
    # after `make clean` so the ASan objects don't replace the BPF binaries that
    # the Rust collector build embeds above.
    - name: Run C unit tests with AddressSanitizer
      run: |
        cd bpf
        make clean
        make ASAN=1 test

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to master, not on PRs
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libelf1 libelf-dev zlib1g-dev libclang-dev \
          make git clang llvm pkg-config build-essential

    - name: Build package
      run: make build

    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Github Packages
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build image and push to GitHub Container Registry
      id: docker_build
      uses: docker/build-push-action@v2
      with:
        context: ./
        file: dockerfile
        platforms: linux/amd64
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
        push: true

    - name: Image digest
      run: echo ${{ steps.docker_build.outputs.digest }}

  publish:
    name: Create GitHub Release and Cargo Package
    runs-on: ubuntu-latest
    needs: test
    # Only run on push to master, not on PRs
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    strategy:
      matrix:
        target: [ x86_64-unknown-linux-gnu ]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: 'recursive'
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Set release version
      id: set_version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -euo pipefail
        BASE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' collector/Cargo.toml | head -1)"
        IFS=. read -r MAJOR MINOR PATCH <<EOF
        $BASE_VERSION
        EOF

        VERSION="$BASE_VERSION"
        while true; do
          TAG="v${VERSION}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::GitHub release ${TAG} already exists; trying next patch version."
          elif git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::notice::Git tag ${TAG} already exists; trying next patch version."
          elif curl -fsS "https://crates.io/api/v1/crates/agentsight/${VERSION}" >/dev/null 2>&1; then
            echo "::notice::crates.io agentsight ${VERSION} already exists; trying next patch version."
          else
            break
          fi
          PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
        done

        sed -i "s/^version = \".*\"/version = \"$VERSION\"/" collector/Cargo.toml
        AGENT_SESSION_BASE_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' agent-session/Cargo.toml | head -1)"
        IFS=. read -r AGENT_SESSION_MAJOR AGENT_SESSION_MINOR AGENT_SESSION_PATCH <<EOF
        $AGENT_SESSION_BASE_VERSION
        EOF

        AGENT_SESSION_VERSION="$AGENT_SESSION_BASE_VERSION"
        while curl -fsS "https://crates.io/api/v1/crates/agent-session/${AGENT_SESSION_VERSION}" >/dev/null 2>&1; do
          echo "::notice::crates.io agent-session ${AGENT_SESSION_VERSION} already exists; trying next patch version."
          AGENT_SESSION_PATCH=$((AGENT_SESSION_PATCH + 1))
          AGENT_SESSION_VERSION="${AGENT_SESSION_MAJOR}.${AGENT_SESSION_MINOR}.${AGENT_SESSION_PATCH}"
        done

        sed -i "s/^version = \".*\"/version = \"$AGENT_SESSION_VERSION\"/" agent-session/Cargo.toml
        sed -i "s/agent-session = { version = \"[^\"]*\", path = \"..\\/agent-session\" }/agent-session = { version = \"$AGENT_SESSION_VERSION\", path = \"..\\/agent-session\" }/" collector/Cargo.toml
        cd collector
        cargo generate-lockfile
        cd ..

        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
        echo "agent_session_version=${AGENT_SESSION_VERSION}" >> "$GITHUB_OUTPUT"
        echo "Using release version v${VERSION}"
        echo "Using agent-session version ${AGENT_SESSION_VERSION}"

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libelf1 libelf-dev zlib1g-dev libclang-dev \
          make git clang llvm pkg-config build-essential

    - name: Build package
      run: make build

    - name: Commit release snapshot
      id: commit_release
      env:
        VERSION: ${{ steps.set_version.outputs.version }}
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # build.rs vendors generated BPF/frontend assets into collector/vendor.
        # Commit the full release snapshot before tagging or publishing so the
        # GitHub release, crates.io package, and master source agree.
        git add agent-session/Cargo.toml collector/Cargo.toml collector/Cargo.lock collector/vendor
        if git diff --cached --quiet; then
          echo "Release snapshot already matches ${VERSION}; no commit needed."
        else
          git commit -m "chore: release agentsight ${VERSION} [skip ci]"
          git push origin "HEAD:${GITHUB_REF#refs/heads/}"
        fi

        if [ -n "$(git status --porcelain --untracked-files=all -- agent-session collector)" ]; then
          echo "::error::release snapshot has uncommitted files after commit."
          git status --short --untracked-files=all -- agent-session collector
          exit 1
        fi

        PUBLISH_SHA="$(git rev-parse HEAD)"
        echo "publish_sha=${PUBLISH_SHA}" >> "$GITHUB_OUTPUT"
        echo "Release source commit: ${PUBLISH_SHA}"

    - name: Verify Cargo package version
      run: |
        VERSION="${{ steps.set_version.outputs.version }}"
        VERSION_NO_V="${VERSION#v}"
        echo "Using Cargo package version: $VERSION_NO_V"
        grep "^version" collector/Cargo.toml
        grep -q "^version = \"$VERSION_NO_V\"" collector/Cargo.toml
        grep -q "^version = \"${{ steps.set_version.outputs.agent_session_version }}\"" agent-session/Cargo.toml
        grep -q "agent-session = { version = \"${{ steps.set_version.outputs.agent_session_version }}\", path = \"../agent-session\" }" collector/Cargo.toml

    - name: Smoke test local release binary
      run: |
        set -euo pipefail
        collector/target/release/agentsight --version
        collector/target/release/agentsight --help | tee /tmp/agentsight-local-help.txt

        for cmd in top record report discover debug; do
          if ! grep -Eq "^[[:space:]]+$cmd[[:space:]]" /tmp/agentsight-local-help.txt; then
            echo "::error::local release binary is missing '$cmd' in agentsight --help"
            exit 1
          fi
        done

    - name: Verify agent-session Cargo package
      run: |
        CARGO_TARGET_DIR=/tmp/agentsight-agent-session-package \
          cargo package --manifest-path agent-session/Cargo.toml

    - name: Publish agent-session crate to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        set -euo pipefail
        if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
          echo "::error::CARGO_REGISTRY_TOKEN is not set; cannot publish to crates.io."
          exit 1
        fi

        VERSION="${{ steps.set_version.outputs.agent_session_version }}"
        if curl -fsS "https://crates.io/api/v1/crates/agent-session/${VERSION}" >/dev/null 2>&1; then
          echo "agent-session ${VERSION} already exists on crates.io; skipping publish."
        else
          cargo publish --manifest-path agent-session/Cargo.toml
        fi

        for attempt in 1 2 3 4 5 6; do
          if curl -fsS "https://crates.io/api/v1/crates/agent-session/${VERSION}" >/dev/null 2>&1; then
            exit 0
          fi
          sleep $((attempt * 10))
        done
        echo "::error::agent-session ${VERSION} was not visible on crates.io after publish."
        exit 1

    - name: Verify agentsight Cargo package
      run: |
        cd collector
        cargo package

    - name: Publish Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          collector/target/release/agentsight
        prerelease: false
        tag_name: ${{ steps.set_version.outputs.tag }}
        target_commitish: ${{ steps.commit_release.outputs.publish_sha }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Smoke test published release artifact
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_TAG: ${{ steps.set_version.outputs.tag }}
      run: |
        set -euo pipefail

        smoke_dir="$(mktemp -d)"
        gh release download "$RELEASE_TAG" \
          --repo "$GITHUB_REPOSITORY" \
          --pattern agentsight \
          --dir "$smoke_dir" \
          --clobber

        chmod +x "$smoke_dir/agentsight"
        "$smoke_dir/agentsight" --version
        "$smoke_dir/agentsight" --help | tee "$smoke_dir/help.txt"

        for cmd in top record report discover debug; do
          if ! grep -Eq "^[[:space:]]+$cmd[[:space:]]" "$smoke_dir/help.txt"; then
            echo "::error::release artifact is missing '$cmd' in agentsight --help"
            exit 1
          fi
        done

    - name: Publish agentsight crate to crates.io
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      run: |
        set -euo pipefail
        if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
          echo "::error::CARGO_REGISTRY_TOKEN is not set; cannot publish to crates.io."
          exit 1
        fi

        cd collector
        cargo publish

    - name: Smoke test cargo install from crates.io
      env:
        VERSION: ${{ steps.set_version.outputs.version }}
      run: |
        set -euo pipefail

        install_dir="$(mktemp -d)"
        for attempt in 1 2 3 4 5 6; do
          if cargo install agentsight \
            --version "$VERSION" \
            --locked \
            --root "$install_dir"; then
            break
          fi

          if [ "$attempt" -eq 6 ]; then
            echo "::error::cargo install agentsight ${VERSION} failed after ${attempt} attempts"
            exit 1
          fi

          sleep $((attempt * 10))
        done

        "$install_dir/bin/agentsight" --version
        "$install_dir/bin/agentsight" --help | tee /tmp/agentsight-cargo-install-help.txt

        for cmd in top record report discover debug; do
          if ! grep -Eq "^[[:space:]]+$cmd[[:space:]]" /tmp/agentsight-cargo-install-help.txt; then
            echo "::error::cargo-installed agentsight is missing '$cmd' in --help"
            exit 1
          fi
        done
